{% extends "base.html" %}
{% block title %}Login - TaskFlow{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 85vh;">
  <div class="card" style="width: 100%; max-width: 450px;">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center"
          style="width: 70px; height: 70px; font-size: 2rem; font-weight: bold; margin-bottom: 15px;">
          TF
        </div>
        <h3 class="fw-bold">TaskFlow</h3>
        <p class="text-muted">Team Task Management System</p>
      </div>

      <form method="POST" action="{{ url_for('login') }}">
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username"
              required autofocus>
          </div>
        </div>

        <div class="mb-4">
          <label for="password" class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password"
              required>
          </div>
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-primary btn-lg">
            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
          </button>
        </div>

        <!-- <div class="text-center mt-3">
          <div class="alert alert-info">
            <strong>Try these credentials:</strong><br>
            Leader: teamlead / lead123<br>
            Member: dev1 / member123
          </div>
        </div> -->
      </form>
    </div>
  </div>
</div>
{% endblock %}
