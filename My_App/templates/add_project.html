{% extends "base.html" %}
{% block title %}Add Project - TaskFlow{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="fw-bold"><i class="bi bi-plus-circle me-2"></i>Assign New Project</h2>
  <a href="{{ url_for('Projects') }}" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i> Back to Projects List
  </a>
</div>

<div class="card">
  <div class="card-body">
    <form method="POST" action="{{ url_for('add_project') }}">
      <div class="row mb-3">

        <div class="col-md-6">
          <label for="project_name" class="form-label fw-bold">Project Name <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="project_name" name="project_name" placeholder="Enter project name"
            required>
        </div>

        <div class="col-md-6">
          <label for="project_group" class="form-label fw-bold">Project Group </label>
          <input type="text" class="form-control" id="project_group" name="project_group"
            placeholder="Enter project group">
        </div>


      </div>

      <div class="d-grid d-md-flex justify-content-md-end gap-2">
        <a href="{{ url_for('Projects') }}" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-circle me-1"></i> Assign Project
        </button>
      </div>
    </form>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script>

</script>
{% endblock %}
